<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VueForge Core Showcase</title>
    <style>
      html,
      body {
        margin: 0;
        background: #f6f8fb;
        color: #1f232b;
      }

      html[data-vf-theme="dark"],
      html[data-vf-theme="dark"] body {
        background: #1e1e1e;
        color: #d4d4d4;
        color-scheme: dark;
      }
    </style>
    <script>
      (() => {
        const storageKey = "vf-theme";
        const attribute = "data-vf-theme";

        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : prefersDark
                ? "dark"
                : "light";

          document.documentElement.setAttribute(attribute, theme);
          document.documentElement.style.colorScheme =
            theme === "dark" ? "dark" : "light";
        } catch {
          document.documentElement.setAttribute(attribute, "light");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/dev/main.ts"></script>
  </body>
</html>
